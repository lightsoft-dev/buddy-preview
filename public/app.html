<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Buddy Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff;
    --common: #8b949e; --uncommon: #3fb950; --rare: #58a6ff;
    --epic: #bc8cff; --legendary: #d29922;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }

  header {
    text-align: center; padding: 32px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #161b22 0%, var(--bg) 100%);
  }
  header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  header p { color: var(--dim); font-size: 12px; margin-top: 6px; }

  .controls {
    display: flex; flex-wrap: wrap; gap: 12px; padding: 20px;
    justify-content: center; align-items: flex-end;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-group label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
  .control-group select, .control-group input {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; font-family: inherit; font-size: 13px;
    cursor: pointer; min-width: 120px;
  }
  .control-group select:hover, .control-group input:hover { border-color: var(--accent); }
  .control-group select:focus, .control-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.2); }

  .eye-picker { display: flex; gap: 4px; }
  .eye-btn {
    width: 36px; height: 36px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .eye-btn:hover { border-color: var(--accent); background: #1c2333; }
  .eye-btn.active { border-color: var(--accent); background: #1c2333; box-shadow: 0 0 0 2px rgba(88,166,255,0.3); }

  .tabs {
    display: flex; justify-content: center; gap: 4px; padding: 16px 20px 0;
  }
  .tab {
    padding: 8px 20px; border-radius: 8px 8px 0 0; border: 1px solid var(--border);
    border-bottom: none; background: var(--bg); color: var(--dim); cursor: pointer;
    font-family: inherit; font-size: 12px; transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--card); color: var(--accent); border-color: var(--accent); }

  .view-container {
    padding: 24px 20px; display: flex; justify-content: center;
  }

  /* ŌöĆŌöĆ Card View ŌöĆŌöĆ */
  .card {
    border: 2px solid var(--border); border-radius: 12px; overflow: hidden;
    background: var(--card); width: 380px; transition: border-color 0.3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .card.common { border-color: var(--common); }
  .card.uncommon { border-color: var(--uncommon); }
  .card.rare { border-color: var(--rare); }
  .card.epic { border-color: var(--epic); }
  .card.legendary { border-color: var(--legendary); animation: legendaryGlow 2s infinite alternate; }

  @keyframes legendaryGlow {
    from { box-shadow: 0 0 20px rgba(210,153,34,0.3); }
    to { box-shadow: 0 0 40px rgba(210,153,34,0.6); }
  }

  .card-sprite {
    text-align: center; padding: 20px 20px 12px; font-size: 15px;
    line-height: 1.35; white-space: pre; min-height: 260px;
    position: relative; cursor: pointer; user-select: none;
  }
  .card-sprite:active .hearts { opacity: 1; }

  .card-info {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-name { font-size: 18px; font-weight: 700; }
  .card-name .shiny { margin-right: 4px; }
  .card-rarity { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .card-species { font-size: 12px; color: var(--dim); margin-top: 2px; }

  .card-stats { padding: 12px 20px 20px; border-top: 1px solid var(--border); }
  .stat-row { display: flex; align-items: center; margin: 6px 0; gap: 8px; }
  .stat-label { font-size: 11px; color: var(--dim); width: 80px; text-transform: uppercase; }
  .stat-bar-bg { flex: 1; height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .stat-value { font-size: 11px; width: 28px; text-align: right; }

  .hearts {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: #f85149;
  }
  .hearts.show { opacity: 1; }

  /* ŌöĆŌöĆ Speech Bubble ŌöĆŌöĆ */
  .bubble-area {
    text-align: center; padding: 0 20px 12px; min-height: 52px;
    display: flex; align-items: center; justify-content: center;
  }
  .speech-bubble {
    background: #1c2333; border: 1px solid var(--border); border-radius: 12px;
    padding: 8px 14px; font-size: 12px; color: var(--dim); font-style: italic;
    max-width: 300px; opacity: 0; transition: opacity 0.5s;
    position: relative;
  }
  .speech-bubble.show { opacity: 1; }
  .speech-bubble::after {
    content: ''; position: absolute; bottom: -7px; left: 50%;
    transform: translateX(-50%); width: 12px; height: 7px;
    background: #1c2333; clip-path: polygon(0 0, 100% 0, 50% 100%);
  }

  /* ŌöĆŌöĆ Gallery View ŌöĆŌöĆ */
  .gallery {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; max-width: 1100px; width: 100%;
  }
  .gallery-item {
    border: 1px solid var(--border); border-radius: 8px; padding: 16px 8px 12px;
    text-align: center; cursor: pointer; transition: all 0.15s;
    background: var(--card); position: relative; overflow: hidden;
  }
  .gallery-item:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .gallery-item .sprite { font-size: 13px; line-height: 1.25; white-space: pre; height: 8.75em; display: flex; align-items: flex-end; justify-content: center; }
  .gallery-item .name { font-size: 11px; color: var(--dim); margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

  /* ŌöĆŌöĆ Gacha View ŌöĆŌöĆ */
  .gacha-area { text-align: center; max-width: 500px; width: 100%; }
  .gacha-input-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .gacha-input-row input {
    flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; font-family: inherit; font-size: 14px;
  }
  .gacha-input-row input:focus { outline: none; border-color: var(--accent); }
  .gacha-btn {
    padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600; transition: all 0.15s;
  }
  .gacha-btn.primary { background: var(--accent); color: #fff; }
  .gacha-btn.primary:hover { background: #79c0ff; transform: scale(1.02); }
  .gacha-btn.secondary { background: var(--border); color: var(--text); }
  .gacha-btn.secondary:hover { background: #484f58; }

  .hatch-animation {
    font-size: 48px; padding: 40px; animation: hatchBounce 0.6s ease;
  }
  @keyframes hatchBounce {
    0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    50% { transform: scale(1.15) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes fadeInUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .card.hatched { animation: fadeInUp 0.5s ease; }

  .rarity-distribution {
    display: flex; gap: 2px; height: 8px; border-radius: 4px; overflow: hidden;
    margin: 16px 0; width: 100%;
  }
  .rarity-distribution div { transition: width 0.3s; }

  /* ŌöĆŌöĆ Animation Controls ŌöĆŌöĆ */
  .anim-controls {
    display: flex; gap: 8px; justify-content: center; margin-top: 12px;
  }
  .anim-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-family: inherit;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .anim-btn:hover { border-color: var(--accent); }
  .anim-btn.active { border-color: var(--accent); color: var(--accent); }

  .speed-label { font-size: 11px; color: var(--dim); display: flex; align-items: center; gap: 4px; }

  /* ŌöĆŌöĆ Share Modal ŌöĆŌöĆ */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; max-width: 480px; width: 90%; position: relative;
    box-shadow: 0 16px 64px rgba(0,0,0,0.5); animation: fadeInUp 0.3s ease;
  }
  .modal-close {
    position: absolute; top: 12px; right: 16px; background: none; border: none;
    color: var(--dim); font-size: 20px; cursor: pointer; padding: 4px 8px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .share-preview {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; white-space: pre; font-size: 12px; line-height: 1.3;
    text-align: center; overflow-x: auto; margin-bottom: 16px;
  }
  .share-url {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 12px; color: var(--accent); width: 100%;
    font-family: inherit; margin-bottom: 16px; text-align: center;
  }
  .share-btns { display: flex; gap: 8px; }
  .share-btns .gacha-btn { flex: 1; padding: 10px 16px; font-size: 13px; }
  .copied-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--uncommon); color: #000; padding: 8px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600; z-index: 200; animation: fadeInUp 0.3s ease;
  }
</style>
</head>

function mulberry32(seed) {
  let a = seed >>> 0;

}
function hashString(s) { let h=2166136261; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);} return h>>>0; }

  const stats={};
  for(const n of STAT_NAMES) {
    if(n===peak) stats[n]=Math.min(100,floor+50+Math.floor(rng()*30));
    else if(n===dump) stats[n]=Math.max(1,floor-10+Math.floor(rng()*15));
    else stats[n]=floor+Math.floor(rng()*40);
  }
  return stats;
}
function rollCompanion(userId) {
  const rng=mulberry32(hashString(userId+'friend-2026-401')), rarity=rollRarity(rng);
  return { rarity, species:pick(rng,SPECIES_LIST), eye:pick(rng,EYES), hat:rarity==='common'?'none':pick(rng,HATS_LIST), shiny:rng()<0.01, stats:rollStats(rng,rarity), name:pick(rng,NAMES) };
}

// ŌöĆŌöĆ Render ŌöĆŌöĆ
function renderSprite(species, eye, hat, frame=0) {
  const frames=BODIES[species], body=frames[frame%frames.length].map(l=>l.replaceAll('{E}',eye));
  const lines=[...body];
  if(hat!=='none' && !lines[0].trim()) lines[0]=HAT_LINES[hat];
  return lines;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ŌöĆŌöĆ ASCII Speech Bubble ŌöĆŌöĆ
const BUBBLE_LINES_MAX = 6; // fixed height to prevent layout jumps
function renderAsciiBubble(text, maxW=30) {
  if(!text) {
    // return empty lines to keep height stable
    return Array(BUBBLE_LINES_MAX).fill('');
  }
  // word wrap
  const words = text.split(' '), wrapped = [];
  let cur = '';
  for(const w of words) {
    if(cur.length + w.length + 1 > maxW && cur) { wrapped.push(cur); cur = w; }
    else cur = cur ? cur + ' ' + w : w;
  }
  if(cur) wrapped.push(cur);
  const innerW = Math.max(...wrapped.map(l=>l.length), 4);
  const lines = [];
  lines.push('ŌĢŁ' + 'ŌöĆ'.repeat(innerW + 2) + 'ŌĢ«');
  for(const l of wrapped) lines.push('Ōöé ' + l.padEnd(innerW) + ' Ōöé');
  lines.push('ŌĢ░' + 'ŌöĆ'.repeat(innerW + 2) + 'ŌĢ»');
  // tail pointing down toward sprite
  const tailPad = Math.min(6, innerW);
  lines.push(' '.repeat(tailPad) + 'ŌĢ▓');
  lines.push(' '.repeat(tailPad + 1) + 'ŌĢ▓');
  // pad to fixed height
  while(lines.length < BUBBLE_LINES_MAX) lines.unshift('');
  return lines;
}

// ŌöĆŌöĆ State ŌöĆŌöĆ
let state = {
  species:'cat', eye:'┬Ę', hat:'none', view:'card', tick:0, animTimer:null,

const IDLE = [0,0,0,0,1,0,0,0,-1,0,0,2,0,0,0];

// ŌöĆŌöĆ Render Views ŌöĆŌöĆ
function render() {
  const container = document.getElementById('viewContainer');
  if(state.view==='card') renderCard(container);
  else if(state.view==='gallery') renderGallery(container);
  else if(state.view==='gacha') renderGacha(container);
}

function getStatColor(rarity) {
  return `var(--${rarity})`;
}

function buildSpriteHtml(species, eye, hat, tick, name, color) {
  const step = IDLE[tick % IDLE.length];
  let frame, blink=false;
  if(step===-1){frame=0;blink=true;} else frame=step;
  let lines = renderSprite(species, eye, hat, frame);
  if(blink) lines = lines.map(l=>l.replaceAll(eye,'-'));

  const quipIdx = Math.floor(tick / 12) % QUIPS.length;
  const showQuip = (tick % 12) < 8;
  const quipText = showQuip ? (name + ' ' + QUIPS[quipIdx]) : '';
  const bubbleLines = renderAsciiBubble(quipText);
  const allLines = [...bubbleLines, ...lines];
  const bubbleCount = bubbleLines.length;
  return allLines.map((l, i) => {
    const esc = escHtml(l);
    if(i < bubbleCount) return `<span style="color:var(--dim);opacity:${showQuip?'1':'0.3'}">${esc}</span>`;
    return `<span style="color:${color}">${esc}</span>`;
  }).join('\n');
}

let cardMounted = false;
let cardSpeciesKey = '';

function renderGallery(container) {
  const {eye, hat} = state;
  const step = IDLE[state.tick % IDLE.length];
  let frame, blink=false;
  if(step===-1){frame=0;blink=true;} else frame=step;

  container.innerHTML = `
    <div class="gallery">
      ${SPECIES_LIST.map(s => {
        let lines = renderSprite(s, eye, hat, frame);
        if(blink) lines = lines.map(l=>l.replaceAll(eye,'-'));
        const trimmed = lines[0].trim() ? lines : lines.slice(1);
        return `
          <div class="gallery-item" onclick="selectSpecies('${s}')">
            <div class="sprite">${escHtml(trimmed.join('\n'))}</div>
            <div class="name">${s}</div>
          </div>

      }).join('')}
    </div>
  `;
}

function doGachaRoll() {
  const input = document.getElementById('gachaInput')?.value?.trim();
  if(!input) return;
  state.gachaUserId = input;
  state.gachaComp = rollCompanion(input);
  state.gachaPhase = 'hatching';

function doRandomRoll() {
  state.gachaUserId = null;

  state.gachaPhase = 'hatching';
  // Force re-mount gacha card on next result render
  const old = document.getElementById('gachaSpriteContent');
  if(old) old.id = '';
  render();
}

// ŌöĆŌöĆ Share ŌöĆŌöĆ
const SITE_URL = window.location.origin + window.location.pathname;

function buildShareText(c) {
  const sprite = renderSprite(c.species, c.eye, c.hat, 0);
  const bubble = renderAsciiBubble(`I'm ${c.name}'s gacha!`);
  const face = FACES[c.species](c.eye);
  const bar = (v) => 'Ō¢ł'.repeat(Math.round(v/100*12)) + 'Ō¢æ'.repeat(12-Math.round(v/100*12));
  const lines = [
    ...bubble,
    ...sprite,
    '',
    `${c.shiny?'Ō£© ':''}${c.name}  ${RARITY_STARS[c.rarity]} ${c.rarity.toUpperCase()}`,
    `${c.species} ${face}`,
    '',
    ...STAT_NAMES.map(s => `${s.padEnd(12)}${bar(c.stats[s])} ${c.stats[s]}`),
    '',
    `­¤ÉŠ Claude Code Buddy`,
    getShareUrl(),
  ];
  return lines.join('\n');
}

function buildSharePreviewHtml(c) {
  const sprite = renderSprite(c.species, c.eye, c.hat, 0);
  const bubble = renderAsciiBubble(`I'm ${c.name}'s gacha!`);
  const color = `var(--${c.rarity})`;
  const allLines = [...bubble, ...sprite];
  const bubbleCount = bubble.length;
  return allLines.map((l,i) => {
    const esc = escHtml(l);
    if(i < bubbleCount) return `<span style="color:var(--dim)">${esc}</span>`;
    return `<span style="color:${color}">${esc}</span>`;
  }).join('\n');
}

function getShareUrl() {
  if(!state.gachaUserId) return SITE_URL;
  return SITE_URL + '?user=' + encodeURIComponent(state.gachaUserId);
}

function openShareModal() {
  const c = state.gachaComp;
  if(!c) return;
  const shareUrl = getShareUrl();
  const color = `var(--${c.rarity})`;
  const face = FACES[c.species](c.eye);
  const previewHtml = buildSharePreviewHtml(c);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'shareModal';
  overlay.onclick = (e) => { if(e.target === overlay) closeShareModal(); };
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" onclick="closeShareModal()">Ō£Ģ</button>
      <div class="modal-title" style="color:${color}">­¤ōż Share ${c.name}</div>
      <div class="share-preview">${previewHtml}

<span style="color:${color};font-weight:bold">${c.shiny?'Ō£© ':''}${c.name}</span>  <span style="color:var(--dim)">${RARITY_STARS[c.rarity]} ${c.rarity.toUpperCase()}</span>
<span style="color:var(--dim)">${c.species} ${escHtml(face)}</span></div>
      <input class="share-url" type="text" value="${shareUrl}" readonly onclick="this.select()">
      <div class="share-btns">
        <button class="gacha-btn secondary" onclick="copyShareText()">­¤ōŗ Copy Text</button>
        <button class="gacha-btn secondary" onclick="copyShareLink()">­¤öŚ Copy Link</button>
        <button class="gacha-btn primary" onclick="saveShareImage()">­¤¢╝ Save Image</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function closeShareModal() {
  document.getElementById('shareModal')?.remove();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'copied-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2000);
}

function copyShareText() {
  const text = buildShareText(state.gachaComp);
  navigator.clipboard.writeText(text).then(()=> showToast('Copied to clipboard!'));
}

function copyShareLink() {
  navigator.clipboard.writeText(getShareUrl()).then(()=> showToast('Link copied!'));
}

function saveShareImage() {
  const c = state.gachaComp;
  if(!c) return;
  const text = buildShareText(c);
  const lines = text.split('\n');

  const scale = 2;
  const fontSize = 14;
  const lineHeight = fontSize * 1.4;
  const padX = 32, padY = 28;

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = `${fontSize}px "JetBrains Mono", "Courier New", monospace`;
  const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));

  canvas.width = (maxW + padX * 2) * scale;
  canvas.height = (lines.length * lineHeight + padY * 2) * scale;
  ctx.scale(scale, scale);

  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Border
  const rc = {common:'#8b949e',uncommon:'#3fb950',rare:'#58a6ff',epic:'#bc8cff',legendary:'#d29922'};
  ctx.strokeStyle = rc[c.rarity] || '#30363d';
  ctx.lineWidth = 2;
  ctx.roundRect(4, 4, canvas.width/scale - 8, canvas.height/scale - 8, 12);
  ctx.stroke();

  // Text
  ctx.font = `${fontSize}px "JetBrains Mono", "Courier New", monospace`;
  ctx.textBaseline = 'top';
  const spriteColor = rc[c.rarity] || '#e6edf3';

  const bubbleEnd = BUBBLE_LINES_MAX;
  const spriteEnd = bubbleEnd + 5;

  lines.forEach((line, i) => {
    if(i < bubbleEnd) ctx.fillStyle = '#8b949e';
    else if(i < spriteEnd) ctx.fillStyle = spriteColor;
    else if(line.startsWith(c.name) || line.startsWith('Ō£©')) ctx.fillStyle = spriteColor;
    else if(line.startsWith('­¤ÉŠ') || line.startsWith('http')) ctx.fillStyle = '#58a6ff';
    else ctx.fillStyle = '#8b949e';
    ctx.fillText(line, padX, padY + i * lineHeight);
  });

  canvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `buddy-${c.name.toLowerCase()}-${c.species}.png`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Image saved!');
  });
}

// ŌöĆŌöĆ Animation Loop ŌöĆŌöĆ
function restartAnimation() {
  if(state.animTimer) clearInterval(state.animTimer);
  state.animTimer = setInterval(()=>{
    state.tick++;
    const container = document.getElementById('viewContainer');
    if(state.view === 'card') renderCard(container);
    else if(state.view === 'gallery') renderGallery(container);
    else if(state.view === 'gacha' && state.gachaPhase === 'result') renderGacha(container);
  }, state.speed);
}

// Check URL param: ?user=xxx ŌåÆ auto-show gacha result

if(urlUser) {

  state.gachaPhase = 'result';

    t.classList.toggle('active', t.dataset.view === 'gacha');
  });
}
render();
restartAnimation();
